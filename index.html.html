/* 🌠 Shooting Stars CSS */
.shooting-star {

    100% {

function unlock(){
    let p = document.getElementById("pass").value;
    if(p.toLowerCase() === "piyarigappo"){
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("main").classList.remove("hidden");
        checkBirthday();
        startCountdown();
        startShootingStars();
    } else {
        alert("Ghalat password hai Gappoo!😁💕");
    }
}

function checkBirthday() {
    let today = new Date();
    if (today.getMonth() === 3 && today.getDate() === 24) {
        document.getElementById("bdayMsg").classList.remove("hidden");
        initFireworks(); 
    }
}

function startCountdown(){
    setInterval(() => {
        let now = new Date();
        let target = new Date(now.getFullYear(), 3, 24);
        if (now > target) { target = new Date(now.getFullYear() + 1, 3, 24); }
        let diff = target - now;
        let d = Math.floor(diff/(1000*60*60*24));
        let h = Math.floor((diff/(1000*60*60))%24);
        let m = Math.floor((diff/(1000*60))%60);
        let s = Math.floor((diff/1000)%60);
        document.getElementById("countdown").innerText = d+"d "+h+"h "+m+"m "+s+"s ❤️";
        document.getElementById("nextYear").innerText = target.getFullYear() + " birthday coming 🌙";
    }, 1000);
}

let typeInterval;
function typeWriter(text){
    let i=0; let el=document.getElementById("typing"); el.innerHTML="";
    clearInterval(typeInterval);
    typeInterval = setInterval(()=>{
        el.innerHTML += text[i]; i++;
        if(i>=text.length) clearInterval(typeInterval);
    },40);
}

function openWhen(type){
    let arr = openMessages[type];
    document.getElementById("openBox").innerText = arr[Math.floor(Math.random()*arr.length)];
}

function showRandomMessage(){
    let t = messages[Math.floor(Math.random()*messages.length)];
    typeWriter(t);
}

function initFireworks() {
    const canvas = document.getElementById('fwCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];
    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
            this.alpha = 1; this.friction = 0.95;
        }
        draw() {
            ctx.globalAlpha = this.alpha;
            ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill();
        }
        update() {
            this.velocity.x *= this.friction; this.velocity.y *= this.friction;
            this.x += this.velocity.x; this.y += this.velocity.y;
            this.alpha -= 0.01;
        }
    }
    function createFirework() {
        const x = Math.random() * canvas.width;
        const y = Math.random() * (canvas.height / 2);
        const color = `hsl(${Math.random() * 360}, 100%, 50%)`;
        for (let i = 0; i < 40; i++) { particles.push(new Particle(x, y, color)); }
    }
    function animate() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
            if (p.alpha > 0) { p.update(); p.draw(); } 
            else { particles.splice(i, 1); }
        });
        requestAnimationFrame(animate);
    }
    // This starts the fireworks
    let fwTimer = setInterval(createFirework, 800);
    
    // THIS IS THE FIX:
    // It waits 15 seconds, then stops the loop and removes the canvas
    setTimeout(() => {
        clearInterval(fwTimer); // Stops new fireworks from appearing
        canvas.style.opacity = '0'; // Fades them out
        setTimeout(() => canvas.remove(), 2000); // Deletes the fireworks layer
    }, 8000); 
    
    animate();
}

        let s = document.createElement("div");
        s.className = "shooting-star";
        // Random starting position on the top-left side of the screen
        s.style.top = Math.random() * window.innerHeight / 2 + "px";
        s.style.left = Math.random() * window.innerWidth / 2 + "px";
        document.body.appendChild(s);
        
        // Remove the element from the code once the animation is done
        setTimeout(() => s.remove(), 1500);
    }, 4000); 
}
</script>
</body>
</html>
